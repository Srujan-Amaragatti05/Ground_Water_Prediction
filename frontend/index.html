</head>

<body>

    <h1>Groundwater Wells Map (Andhra Pradesh)</h1>

    <div id="controls">
        <label>
            Year:&nbsp;
            <select id="yearSelect"></select>
        </label>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <!-- Manual Prediction Section -->
    <div id="manual-section">
        <h3>Manual Groundwater Prediction</h3>

        <div class="form-row">
            <label>DISTRICT</label>
            <input type="text" id="m_district" placeholder="e.g. Krishna">
        </div>

        <div class="form-row">
            <label>BLOCK</label>
            <input type="text" id="m_block" placeholder="e.g. Vijayawada Rural">
        </div>

        <div class="form-row">
            <label>LATITUDE</label>
            <input type="number" id="m_latitude" step="0.0001">
        </div>

        <div class="form-row">
            <label>LONGITUDE</label>
            <input type="number" id="m_longitude" step="0.0001">
        </div>

        <div class="form-row">
            <label>YEAR</label>
            <input type="number" id="m_year" placeholder="2025">
        </div>

        <div class="form-row">
            <label>MONTH</label>
            <input type="number" id="m_month" placeholder="6">
        </div>

        <button id="manualPredictBtn">Predict</button>

        <div id="manualResult"></div>
    </div>

    <!-- Scripts -->
    
    
    <div id="details" style="width:90%;margin:15px auto;padding:12px;
            border:1px solid #ccc;border-radius:8px;
            font-family:Arial, sans-serif;">
        <b>Well Details</b><br>
        Click a well marker to see prediction.
    </div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Marker Cluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    
    <script src="map.js"></script>
    <script src="manualPredict.js"></script>

        /* -------------------------------

        const map = L.map("map", { preferCanvas: true })

            attribution: "© OpenStreetMap contributors"

        /* Color based on groundwater depth */
        function getColor(wl) {
            if (wl <= 5) return "blue";
            if (wl <= 10) return "yellow";
            return "red";
        }

        /* Cluster group */
        const clusterGroup = L.markerClusterGroup({
            disableClusteringAtZoom: 13,
            showCoverageOnHover: false
        });

                    const opt = document.createElement("option");

                    opt.textContent = year;

                });

                /* Default = latest year */

        /* -------------------------------

        function plotYear(selectedYear) {
            clusterGroup.clearLayers();

            const bounds = [];
            const filtered = allData.filter(d => d.year == selectedYear);

            filtered.forEach(well => {
                bounds.push([well.latitude, well.longitude]);

                L.circleMarker(
                    [well.latitude, well.longitude],
                    {
                        radius: 6,
                        weight: 1,
                        color: getColor(well.wl),
                        fillColor: getColor(well.wl),
                        fillOpacity: 0.7
                    }
                )
                    .on("click", async () => {

                        const selectedYear = Number(yearSelect.value);

                        // Show loading
                        detailsDiv.innerHTML = `
        <b>Well Details</b><br>

                                BLOCK: String(well.block)
                            });


                            // Predict for +2 year
                            const pred2 = await fetchPrediction({
                                Year: selectedYear + 2,
                                Month: 6,
                                LATITUDE: Number(well.latitude),
                                LONGITUDE: Number(well.longitude),
                                DISTRICT: String(well.district),

                            });


                            // Update details panel
                            detailsDiv.innerHTML = `
            <b>Well Details</b><br><br>

            <b>Location</b><br>
            District: ${well.district}<br>
            Block: ${well.block}<br>
            Village: ${well.village}<br><br>

            <b>Current WL (${selectedYear})</b><br>
            ${well.wl} mbgl<br><br>

            <b>Predicted WL</b><br>
            ${selectedYear + 1}: ${pred1.predicted_WL.toFixed(2)} mbgl<br>
            ${selectedYear + 2}: ${pred2.predicted_WL.toFixed(2)} mbgl<br><br>

            <b>Risk Category</b><br>
            ${pred2.risk_category}
        `;
                        } catch (err) {
                            detailsDiv.innerHTML = `
            <b>Error</b><br>
            Unable to fetch prediction.<br>
            Please check backend service.
        `;
                            console.error(err);
                        }
                    })
                    .addTo(clusterGroup);

            });

            if (bounds.length) {
                map.fitBounds(bounds);
                map.invalidateSize();
            }
        }

        /* -------------------------------
           Year change handler

        yearSelect.addEventListener("change", e => {
            plotYear(e.target.value);
        });

        /* -------------------------------
           Legend
        -------------------------------- */
        const legend = L.control({ position: "bottomright" });

        legend.onAdd = function () {

            div.innerHTML = `

        <span style="background: blue"></span> Shallow (≤ 5 mbgl)<br>
        <span style="background: yellow"></span> Moderate (5–10 mbgl)<br>
        <span style="background: red"></span> Deep (> 10 mbgl)
    `;
            return div;
        };

        legend.addTo(map);
    </script> -->
